app:
  server:
    host: "0.0.0.0"
    port: 8888
    max_header_bytes: 65536
  timeouts:
    handler_timeout: "5s"
    read_header_timeout: "1s"
    write_timeout: "5s"
    idle_timeout: "10s"
  limits:  
    rate_limiter:
      capacity: 500
      refill_rate: 300
    concurrency_limit: 30
    size_limit: 10485760
  security:
    read_token: "123"
    write_token: "321"
  storage: "inmemory"
log:
  level: "info"
  type: "json"
image:
  ext: "jpeg"
  max_dimension: 2000
storage:
  filesystem:
    path: "./data"
    garbage_collector:
      enabled: true
      interval: 60m
      workers_count: 5
